name: Compile LaTeX

on:
  push:
    branches-ignore: [main]

# Allow the workflow to push compiled PDFs back to the PR branch
permissions:
  contents: write

jobs:
  build:
    name: Build PDF
    runs-on: ubuntu-latest
    # Skip when the CI bot commits the PDF back
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check branch is up-to-date with main
        run: |
          git fetch origin main
          BEHIND=$(git rev-list --count HEAD..origin/main)
          if [ "$BEHIND" -gt 0 ]; then
            echo "::warning::This branch is $BEHIND commit(s) behind main. Merge main before requesting a review, otherwise the compiled PDF may not reflect the final state after merging."
          fi

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          args: -pdf -interaction=nonstopmode -file-line-error -jobname=${{ github.event.repository.name }}

      - name: Commit compiled PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: recompile PDF"
          file_pattern: "*.pdf"
          commit_options: "--no-verify"
          skip_dirty_check: false
